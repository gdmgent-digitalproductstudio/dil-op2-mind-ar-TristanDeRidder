<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script src="./scripts/face.js"></script>
    <link rel="stylesheet" href="./css/main.css">
    <title>Face tracking</title>
</head>

<body>
    <div class="download">
        <a href="./index.html" class="back_button">Go back</a>
    </div>
    <button id="helmet-button" class="toggle-button">Helmet</button>

    <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="helmet" src="./assets/Helmet.glb"></a-asset-item>
        </a-assets>


        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 8">
            <a-entity class="helmet-button-entity" gltf-model="#helmet" position="0 0 0" scale="0.3 0.3 0.3"
                visibility="true"></a-entity>
        </a-entity>
    </a-scene>

</html>
